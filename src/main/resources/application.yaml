spring:
  application:
    name: signal-brief
  flyway:
    callback-locations: classpath:db/callback
    locations: classpath:db/migration
  task:
    execution:
      thread-name-prefix: signal-async-
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      thread-name-prefix: signal-scheduler-
      pool:
        size: 2
      shutdown:
        await-termination: true
        await-termination-period: 30s
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}

springdoc:
  api-docs:
    enabled: ${SIGNAL_BRIEF_OPENAPI_ENABLED:false}
    path: /internal/api-docs
  swagger-ui:
    enabled: ${SIGNAL_BRIEF_OPENAPI_ENABLED:false}
    path: /internal/swagger-ui.html
    urls:
      - name: internal
        url: /internal/api-docs/internal
    urls-primary-name: internal

signal-brief:
  internal-api:
    enabled: ${SIGNAL_BRIEF_INTERNAL_API_ENABLED:false}
  ingestion:
    enabled: ${SIGNAL_BRIEF_INGESTION_ENABLED:false}
    cron: "${SIGNAL_BRIEF_INGESTION_CRON:0 0 6 1,16 * *}"
  feeds: []
