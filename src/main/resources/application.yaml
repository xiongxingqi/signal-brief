spring:
  application:
    name: signal-brief
  flyway:
    callback-locations: classpath:db/callback
    locations: classpath:db/migration
  task:
    execution:
      thread-name-prefix: signal-async-
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      thread-name-prefix: signal-scheduler-
      pool:
        size: 2
      shutdown:
        await-termination: true
        await-termination-period: 30s
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}

springdoc:
  api-docs:
    enabled: ${SIGNAL_BRIEF_OPENAPI_ENABLED:false}
    path: /internal/api-docs
  swagger-ui:
    enabled: ${SIGNAL_BRIEF_OPENAPI_ENABLED:false}
    path: /internal/swagger-ui.html
    urls:
      - name: internal
        url: /internal/api-docs/internal
    urls-primary-name: internal

signal-brief:
  internal-api:
    enabled: ${SIGNAL_BRIEF_INTERNAL_API_ENABLED:false}
  ingestion:
    enabled: ${SIGNAL_BRIEF_INGESTION_ENABLED:false}
    cron: "${SIGNAL_BRIEF_INGESTION_CRON:0 0 6 1,16 * *}"
  feed-http:
    user-agent: ${SIGNAL_BRIEF_FEED_HTTP_USER_AGENT:signal-brief/0.0.1}
    connect-timeout: ${SIGNAL_BRIEF_FEED_HTTP_CONNECT_TIMEOUT:3s}
    read-timeout: ${SIGNAL_BRIEF_FEED_HTTP_READ_TIMEOUT:10s}
    retry:
      max-attempts: ${SIGNAL_BRIEF_FEED_HTTP_RETRY_MAX_ATTEMPTS:2}
      backoff: ${SIGNAL_BRIEF_FEED_HTTP_RETRY_BACKOFF:1s}
  feeds:
    - name: Spring Blog
      url: https://spring.io/blog.atom
      category: FRAMEWORK
      enabled: true
    - name: Inside Java
      url: https://inside.java/feed.xml
      category: JAVA
      enabled: true
    - name: Kubernetes Blog
      url: https://kubernetes.io/feed.xml
      category: FRAMEWORK
      enabled: true
    - name: OpenAI News
      url: https://openai.com/news/rss.xml
      category: AI
      enabled: true
