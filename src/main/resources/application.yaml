server:
  port: 8080

spring:
  application:
    name: signal-brief
  datasource:
    driver-class-name: org.postgresql.Driver
    # 数据库连接配置通过 SPRING_DATASOURCE_* 环境变量或 profile 配置提供。
    # url: jdbc:postgresql://localhost:5432/signal_brief
    # username: celestrong
    # password: ""
  flyway:
    callback-locations: classpath:db/callback
    locations: classpath:db/migration
  task:
    execution:
      thread-name-prefix: signal-async-
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      thread-name-prefix: signal-scheduler-
      pool:
        size: 2
      shutdown:
        await-termination: true
        await-termination-period: 30s
  mail:
    default-encoding: UTF-8
    # SMTP 基础设施配置通过 SPRING_MAIL_* 环境变量提供。
    # 不在默认配置中声明 host，避免未配置 SMTP 时触发 JavaMailSender 自动配置。
    # host: smtp.example.com
    # port: 587
    # username: ""
    # password: ""
    # properties:
    #   mail:
    #     smtp:
    #       auth: true
    #       starttls:
    #         enable: true
  docker:
    compose:
      enabled: false

springdoc:
  api-docs:
    enabled: false
    path: /internal/api-docs
  swagger-ui:
    enabled: false
    path: /internal/swagger-ui.html
    urls:
      - name: internal
        url: /internal/api-docs/internal
    urls-primary-name: internal

signal-brief:
  internal-api:
    enabled: false
  ingestion:
    enabled: false
    cron: "0 0 6 1,16 * *"
  ai-summary:
    enabled: false
    # AI Provider 配置通过 SIGNAL_BRIEF_AI_SUMMARY_* 环境变量提供。
    # base-url: https://api.example.com/v1
    # api-key: ""
    # model: example-model
    connect-timeout: 3s
    read-timeout: 30s
    temperature: 0.2
    max-output-tokens: 2000
  mail:
    enabled: false
    # 邮件发件人和收件人通过 SIGNAL_BRIEF_MAIL_* 环境变量提供。
    # from: noreply@example.com
    # recipients: reader@example.com
    subject-prefix: SignalBrief 技术半月报
  feed-http:
    user-agent: signal-brief/0.0.1
    connect-timeout: 3s
    read-timeout: 10s
    retry:
      max-attempts: 2
      backoff: 1s
  feeds:
    - name: Spring Blog
      url: https://spring.io/blog.atom
      category: FRAMEWORK
      enabled: true
    - name: Inside Java
      url: https://inside.java/feed.xml
      category: JAVA
      enabled: true
    - name: Kubernetes Blog
      url: https://kubernetes.io/feed.xml
      category: FRAMEWORK
      enabled: true
    - name: OpenAI News
      url: https://openai.com/news/rss.xml
      category: AI
      enabled: true
