name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: signal_brief
          POSTGRES_USER: celestrong
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U celestrong -d signal_brief"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DOCKER_COMPOSE_ENABLED: false
      SPRING_DATASOURCE_USERNAME: celestrong
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/signal_brief
      SERVER_PORT: 8080

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Verify
        run: ./mvnw -B verify
